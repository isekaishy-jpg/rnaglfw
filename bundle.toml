[[bundles]]
name = "glfw3"
language = "c"
source_root = "vendor/glfw"
sources = [
  "src/context.c",
  "src/init.c",
  "src/input.c",
  "src/monitor.c",
  "src/platform.c",
  "src/vulkan.c",
  "src/window.c",
  "src/egl_context.c",
  "src/osmesa_context.c",
  "src/null_init.c",
  "src/null_monitor.c",
  "src/null_window.c",
  "src/null_joystick.c",
  "src/win32_module.c",
  "src/win32_time.c",
  "src/win32_thread.c",
  "src/win32_init.c",
  "src/win32_joystick.c",
  "src/win32_monitor.c",
  "src/win32_window.c",
  "src/wgl_context.c",
]
provides = ["glfw3"]
include_dirs = ["include/GLFW", "src"]
defines = ["_GLFW_WIN32", "UNICODE", "_UNICODE", "_CRT_SECURE_NO_WARNINGS"]
